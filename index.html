<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SalemOS v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <div id="cli-output">
            <p>SalemOS v1.0 Kernel Booted...</p>
            <p>Type 'help' for a list of commands.</p>
        </div>
        
        <form id="prompt-line">
            <span id="prompt-text">root@salem:/# </span>
            <input type="text" id="cli-input" autofocus autocomplete="off">
        </form>
    </div>
    <script src="salem-kernel.js"></script>
</body>
</html>
